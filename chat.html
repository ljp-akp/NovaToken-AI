<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaToken AI Chat</title>

<style>
body{
    margin:0;
    background:#0f172a;
    color:#fff;
    font-family:Arial;
    display:flex;
    flex-direction:column;
    height:100vh;
}

header{
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
    border-bottom:1px solid #222;
}

#chat{
    flex:1;
    padding:20px;
    overflow:auto;
}

.message{
    background:#1e293b;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
}

.bottom{
    display:flex;
    padding:15px;
    background:#111827;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    margin-left:10px;
    padding:12px 20px;
    border:none;
    background:#3b82f6;
    color:white;
    border-radius:8px;
}
</style>
</head>

<body>

<header>🚀 NovaToken AI</header>

<div id="chat">
<div class="message">你好，我是 NovaToken AI。</div>
</div>

<div class="bottom">
<input id="msg" placeholder="请输入内容...">
<button onclick="send()">发送</button>
</div>
<script>
async function send() {

    const input = document.getElementById("msg");
    const chat = document.getElementById("chat");

    if (!input.value.trim()) return;

    const message = input.value;

    chat.innerHTML += `<div class="message">👤 ${message}</div>`;

    input.value = "";

    try {
const res = await fetch("https://aix.6os.net/v1/chat/completions", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        message: message
    })
});
        const data = await res.json();

        chat.innerHTML += `<div class="message">🤖 ${data.reply}</div>`;

    } catch(e){

        chat.innerHTML += `<div class="message">❌ 无法连接后端</div>`;

    }

    chat.scrollTop = chat.scrollHeight;

}
</script>
