<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<button class="btn" onclick="window.location.href='dashboard.html'">
登录
</button>

<link rel="stylesheet" href="css/style.css">

<style>
.login-box{
    width:380px;
    max-width:90%;
    margin:80px auto;
    background:#111827;
    padding:40px;
    border-radius:18px;
    box-shadow:0 0 30px rgba(59,130,246,.25);
}

.login-box h1{
    text-align:center;
    margin-bottom:30px;
}

.input{
    width:100%;
    padding:15px;
    margin-bottom:18px;
    border:none;
    border-radius:10px;
    background:#1f2937;
    color:white;
    font-size:16px;
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.btn:hover{
    opacity:.9;
}

.links{
    text-align:center;
    margin-top:20px;
}

.links a{
    color:#3b82f6;
    text-decoration:none;
}
</style>

</head>

<body>

<div class="login-box">

<h1>🚀 NovaToken AI</h1>

<input class="input" type="email" placeholder="请输入邮箱">

<input class="input" type="password" placeholder="请输入密码">

<button class="btn">登录</button>

<div class="links">
<p>还没有账号？ <a href="register.html">立即注册</a></p>

<p><a href="index.html">← 返回首页</a></p>
</div>

</div>

</body>
</html>
